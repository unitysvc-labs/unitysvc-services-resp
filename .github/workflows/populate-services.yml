name: Populate Services

# Thin caller — logic lives in the shared reusable workflow so a fix lands
# once for all unitysvc-services-* repos. See unitysvc-labs/.github.
# Provider API keys are repo secrets, forwarded via `secrets: inherit`.
# NOTE: pinned to the @reusable-seller-workflows branch for the pilot; flip to
# @main once unitysvc-labs/.github#3 is merged.

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  populate-services:
    permissions:
      contents: write
      pull-requests: write
    uses: unitysvc-labs/.github/.github/workflows/seller-populate-services.yml@reusable-seller-workflows
    secrets: inherit
